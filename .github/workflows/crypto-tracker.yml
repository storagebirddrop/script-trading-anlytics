name: Crypto ATR Tracker

on:
  schedule:
    # Run daily at 9:00 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: write

jobs:
  update-tracker:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run crypto tracker
        run: python crypto_tracker.py
      
      - name: Validate data
        run: python scripts/validate_data.py ATR_Tracker_Dashboard.xlsx --sheet Data
      
      - name: Update history
        run: python scripts/update_history.py
      
      - name: Calculate metrics
        run: python scripts/calculate_metrics.py
      
      - name: Build dashboard
        run: python scripts/build_dashboard.py
      
      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ATR_Tracker_Dashboard.xlsx data/master.csv data/history.csv data/dashboard.json data/metadata.json dashboard/assets/data.json
          git add data/chart_history.json dashboard/assets/chart_history.json 2>/dev/null || true
          git add data/market_caps.json 2>/dev/null || true
          git add data/breadth.json dashboard/assets/breadth.json 2>/dev/null || true
          git add data/correlation.json dashboard/assets/correlation.json 2>/dev/null || true
          git add data/btc_signals.json dashboard/assets/btc_signals.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update crypto tracker data"
          gh auth setup-git
          git push
      # Cloudflare Pages deploys automatically via Git integration on every push to master.
