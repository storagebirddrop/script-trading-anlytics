<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Analytics Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" integrity="sha384-e6nUZLBkQ86NJ6TVVKAeSaK8jWa3NhkYWZFomE39AvDbQWeie9PlQqM3pmYW5d1g" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js" integrity="sha384-oNtu+d18330MVFpltUTve1DatxCkkctlpA2AC3GulbVFOSqhHdDat3qHse/Lbuek" crossorigin="anonymous"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>Trading Analytics</h1>
            <p class="header-subtitle">ATR Distance · Regime Classification</p>
            <div class="last-updated" id="lastUpdated">Loading...</div>
        </header>

        <main class="main-content">
            <!-- Portfolio Overview Tab -->
            <section id="portfolio-tab" class="tab-content active" role="tabpanel" tabindex="-1" aria-labelledby="tab-portfolio">
                <h2>Portfolio Overview</h2>
                <div id="regime-strip" class="regime-strip"></div>
                <div class="filter-bar" id="portfolio-filter-bar">
                    <div class="filter-group">
                        <span class="filter-label">Category</span>
                        <div class="filter-chips" id="filter-category">
                            <button class="chip active" data-value="">All</button>
                            <button class="chip" data-value="crypto">Crypto</button>
                            <button class="chip" data-value="nasdaq">NASDAQ</button>
                            <button class="chip" data-value="lse">LSE</button>
                        </div>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label" for="sort-select">Sort by</label>
                        <select id="sort-select" class="filter-select">
                            <option value="name">Name A–Z</option>
                            <option value="atr_asc">ATR Dist. ↑ (Oversold first)</option>
                            <option value="atr_desc">ATR Dist. ↓ (Extended first)</option>
                            <option value="rsi_asc">RSI ↑</option>
                        </select>
                    </div>
                </div>
                <div id="portfolio-cards" class="cards-container">
                    <div class="loading">Loading dashboard data...</div>
                </div>
            </section>

            <!-- ATR Rankings Tab -->
            <section id="rankings-tab" class="tab-content" role="tabpanel" tabindex="-1" aria-labelledby="tab-rankings">
                <h2>ATR Rankings</h2>
                <div class="rankings-container">
                    <div class="ranking-section">
                        <h3>Most Oversold</h3>
                        <div id="oversold-list" class="ranking-list"></div>
                    </div>
                    <div class="ranking-section">
                        <h3>Most Extended</h3>
                        <div id="extended-list" class="ranking-list"></div>
                    </div>
                </div>
            </section>

            <!-- Historical Context Tab -->
            <section id="historical-tab" class="tab-content" role="tabpanel" tabindex="-1" aria-labelledby="tab-historical">
                <h2>Historical Context</h2>
                <div class="asset-selector">
                    <label for="asset-select">Select Asset:</label>
                    <select id="asset-select"></select>
                </div>
                <div id="historical-content" class="historical-content">
                    <div class="loading">Loading dashboard data...</div>
                </div>
            </section>

            <!-- Asset Drilldown Tab -->
            <section id="drilldown-tab" class="tab-content" role="tabpanel" tabindex="-1" aria-labelledby="tab-drilldown">
                <h2>Asset Drilldown</h2>
                <div class="selectors-row">
                    <div class="asset-selector">
                        <label for="drilldown-asset-select">Asset:</label>
                        <select id="drilldown-asset-select"></select>
                    </div>
                    <div class="timeframe-selector">
                        <label for="timeframe-select">Timeframe:</label>
                        <select id="timeframe-select">
                            <option value="1d">Daily</option>
                            <option value="1w">Weekly</option>
                        </select>
                    </div>
                </div>
                <div id="drilldown-content" class="drilldown-content">
                    <div class="drilldown-summary" id="drilldown-summary">
                        <div class="loading">Loading dashboard data...</div>
                    </div>
                    <div class="chart-container">
                        <div id="price-ema-chart"></div>
                    </div>
                    <div class="chart-container">
                        <div id="atr-distance-chart"></div>
                    </div>
                    <div class="chart-container">
                        <div id="rsi-chart"></div>
                    </div>
                    <div class="chart-container">
                        <div id="weekly-atr-chart"></div>
                    </div>
                </div>
            </section>
        </main>

        <nav class="bottom-nav" role="tablist">
            <button id="tab-portfolio" class="nav-btn active" data-tab="portfolio-tab" role="tab" aria-selected="true" aria-label="Portfolio overview" aria-controls="portfolio-tab">
                <span class="nav-icon" aria-hidden="true">📊</span>
                <span class="nav-label">Portfolio</span>
            </button>
            <button id="tab-rankings" class="nav-btn" data-tab="rankings-tab" role="tab" aria-selected="false" aria-label="ATR Rankings" aria-controls="rankings-tab">
                <span class="nav-icon" aria-hidden="true">📈</span>
                <span class="nav-label">Rankings</span>
            </button>
            <button id="tab-historical" class="nav-btn" data-tab="historical-tab" role="tab" aria-selected="false" aria-label="Historical Context" aria-controls="historical-tab">
                <span class="nav-icon" aria-hidden="true">📉</span>
                <span class="nav-label">Historical</span>
            </button>
            <button id="tab-drilldown" class="nav-btn" data-tab="drilldown-tab" role="tab" aria-selected="false" aria-label="Asset Drilldown" aria-controls="drilldown-tab">
                <span class="nav-icon" aria-hidden="true">🔍</span>
                <span class="nav-label">Drilldown</span>
            </button>
        </nav>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
