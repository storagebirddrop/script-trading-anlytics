<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Analytics Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>Trading Analytics</h1>
            <div class="last-updated" id="lastUpdated">Loading...</div>
        </header>

        <main class="main-content">
            <!-- Portfolio Overview Tab -->
            <section id="portfolio-tab" class="tab-content active">
                <h2>Portfolio Overview</h2>
                <div id="portfolio-cards" class="cards-container">
                    <!-- Asset cards will be injected here -->
                </div>
            </section>

            <!-- ATR Rankings Tab -->
            <section id="rankings-tab" class="tab-content">
                <h2>ATR Rankings</h2>
                <div class="rankings-container">
                    <div class="ranking-section">
                        <h3>Most Oversold</h3>
                        <div id="oversold-list" class="ranking-list">
                            <!-- Oversold assets will be injected here -->
                        </div>
                    </div>
                    <div class="ranking-section">
                        <h3>Most Extended</h3>
                        <div id="extended-list" class="ranking-list">
                            <!-- Extended assets will be injected here -->
                        </div>
                    </div>
                </div>
            </section>

            <!-- Historical Context Tab -->
            <section id="historical-tab" class="tab-content">
                <h2>Historical Context</h2>
                <div class="asset-selector">
                    <label for="asset-select">Select Asset:</label>
                    <select id="asset-select">
                        <!-- Asset options will be injected here -->
                    </select>
                </div>
                <div id="historical-content" class="historical-content">
                    <!-- Historical data will be injected here -->
                </div>
            </section>

            <!-- Asset Drilldown Tab -->
            <section id="drilldown-tab" class="tab-content">
                <h2>Asset Drilldown</h2>
                <div class="asset-selector">
                    <label for="drilldown-asset-select">Select Asset:</label>
                    <select id="drilldown-asset-select">
                        <!-- Asset options will be injected here -->
                    </select>
                </div>
                <div class="timeframe-selector">
                    <label for="timeframe-select">Timeframe:</label>
                    <select id="timeframe-select">
                        <option value="1d">Daily</option>
                        <option value="1w">Weekly</option>
                    </select>
                </div>
                <div id="drilldown-content" class="drilldown-content">
                    <div class="drilldown-summary" id="drilldown-summary">
                        <!-- Summary will be injected here -->
                    </div>
                    <div class="chart-container">
                        <div id="price-ema-chart"></div>
                    </div>
                    <div class="chart-container">
                        <div id="atr-distance-chart"></div>
                    </div>
                    <div class="chart-container">
                        <div id="rsi-chart"></div>
                    </div>
                    <div class="chart-container">
                        <div id="weekly-atr-chart"></div>
                    </div>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn active" data-tab="portfolio-tab">
                <span class="nav-icon">📊</span>
                <span class="nav-label">Portfolio</span>
            </button>
            <button class="nav-btn" data-tab="rankings-tab">
                <span class="nav-icon">📈</span>
                <span class="nav-label">Rankings</span>
            </button>
            <button class="nav-btn" data-tab="historical-tab">
                <span class="nav-icon">📉</span>
                <span class="nav-label">Historical</span>
            </button>
            <button class="nav-btn" data-tab="drilldown-tab">
                <span class="nav-icon">🔍</span>
                <span class="nav-label">Drilldown</span>
            </button>
        </nav>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
